# Brightuity egress proxy — allow-list (auditable in one screen)
# Only these three hosts can be reached from the agent network.
# All other outbound HTTP/HTTPS is denied.
#
# Why Squid:
#   CONNECT method tunneling covers both HTTPS and wss:// (WebSocket-over-TLS).
#   dstdomain ACLs filter CONNECT by hostname — tinyproxy cannot do this.
#
# Allow-list rationale:
#   api.aimlapi.com   — LLM calls: KYC Guardian, Dynamic Compliance, Orchestrator
#   api.featherless.ai — LLM calls: Doc Auditor, Stress Test, Asset Tokenizer
#   app.band.ai        — Band platform: WebSocket (wss://) + REST coordination

http_port 3128

# ── Access control lists ───────────────────────────────────────────────────────
acl CONNECT method CONNECT

acl brightuity_allowed dstdomain api.aimlapi.com
acl brightuity_allowed dstdomain api.featherless.ai
acl brightuity_allowed dstdomain app.band.ai

# CONNECT tunneling (HTTPS REST + wss:// WebSocket) to whitelisted hosts only
http_access allow CONNECT brightuity_allowed
# Plain HTTP to whitelisted hosts (covers health probes and non-TLS paths)
http_access allow brightuity_allowed
# Default deny — everything else is blocked, logged, and dropped
http_access deny all

# ── No caching (this proxy exists for security, not performance) ───────────────
cache deny all
coredump_dir /var/cache/squid

# ── Logging to Docker stdout/stderr ───────────────────────────────────────────
access_log stdio:/dev/stdout combined
cache_log stdio:/dev/stderr
cache_store_log none
